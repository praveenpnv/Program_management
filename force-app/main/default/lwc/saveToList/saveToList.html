<template>
	<div>
		<!-- ======= HEADER ===================================================================================== -->
		<header class="slds-modal__header"><h2 class="slds-text-heading_medium slds-truncate">Save to List</h2></header>
		<!-- ======= BODY ======================================================================================= -->
		<div class="modal-body-container slds-modal__content slds-p-around_small slds-is-relative">
			<template if:true={isConnected}>
				<!-- ======= RADIO ====================================================================================== -->
				<lightning-radio-group label="" variant="label-hidden" options={options} value={mode} onchange={modeChanged} type="radio"></lightning-radio-group>
				<!-- ======= ADD TO NEW ================================================================================= -->
				<p if:true={newListMode} class="slds-p-top_xxsmall slds-align_absolute-center">Enter new List details</p>
				<lightning-record-edit-form
					if:true={newListMode}
					data-id="newListForm"
					object-api-name="TextkernelList__c"
					onload={newListFormLoaded}
					onsuccess={newListFormOnSuccess}
					onerror={onError}
				>
					<template for:each={fields} for:item="field">
						<lightning-input-field key={field.key} data-id={field.dataId} field-name={field.path} required={field.required}></lightning-input-field>
					</template>
				</lightning-record-edit-form>
				<!-- ======= ADD TO EXISTING ============================================================================ -->
				<lightning-record-edit-form
					if:false={newListMode}
					object-api-name="TextkernelListItem__c"
					onload={existingListsFormLoaded}
					onerror={onError}
				>
					<lightning-input-field data-id="existingListId" field-name="TextkernelList__c"></lightning-input-field>
				</lightning-record-edit-form>
			</template>

			<lightning-spinner if:true={processing} alternative-text="" variant="base"></lightning-spinner>
		</div>
		<!-- ======= FOOTER ===================================================================================== -->
		<footer class="slds-modal__footer" >
			<lightning-button
				class="slds-m-left_xx-small"
				variant="neutral"
				title="Cancel"
				label="Cancel"
				onclick={handleCancel}
			></lightning-button>
			<lightning-button
				class="slds-m-left_xx-small"
				disabled={processing}
				variant="neutral"
				title="Save records to List"
				label="Save"
				onclick={save}
			></lightning-button>
			<lightning-button
				class="slds-m-left_xx-small"
				disabled={processing}
				variant="brand"
				title="Save records to List and open"
				label="Save &amp; Open"
				onclick={saveAndOpen}
			></lightning-button>
		</footer>
	</div>
</template>
