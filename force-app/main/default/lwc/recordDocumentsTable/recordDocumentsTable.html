<template>
    <lightning-card title="Documents" icon-name="doctype:attachment">
        <div slot="actions">
            <lightning-button
                label="Add Document"
                icon-name="utility:add"
                onclick={handleAddDocument}
                variant="brand">
            </lightning-button>
        </div>

        <div class="slds-m-around_medium">
            <template if:true={isLoading}>
                <lightning-spinner
                    alternative-text="Loading"
                    size="medium">
                </lightning-spinner>
            </template>

            <template if:true={hasDocuments}>
                <lightning-datatable
                    key-field="id"
                    data={documents}
                    columns={columns}
                    onrowaction={handleRowAction}
                    hide-checkbox-column>
                </lightning-datatable>
            </template>

            <template if:false={hasDocuments}>
                <div class="slds-text-align_center slds-p-vertical_large">
                    <lightning-icon
                        icon-name="doctype:attachment"
                        size="large"
                        class="slds-m-bottom_small">
                    </lightning-icon>
                    <p class="slds-text-heading_small slds-m-bottom_x-small">
                        No documents yet
                    </p>
                    <p class="slds-text-color_weak">
                        Click "Add Document" to get started
                    </p>
                </div>
            </template>
        </div>

        <!-- Add/Replace Document Modal -->
        <template if:true={isModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <!-- Modal Header -->
                    <header class="slds-modal__header">
                        <button
                            class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close"
                            onclick={handleCloseModal}>
                            <lightning-icon
                                icon-name="utility:close"
                                alternative-text="close"
                                size="small">
                            </lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-modal__title slds-hyphenate">{modalTitle}</h2>
                    </header>

                    <!-- Modal Body -->
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="slds-form slds-form_stacked">
                            <!-- Document Name -->
                            <lightning-input
                                label="Document Name"
                                name="documentName"
                                value={documentName}
                                onchange={handleNameChange}
                                required
                                placeholder="e.g., Resume_v3.pdf">
                            </lightning-input>

                            <!-- Document Type -->
                            <lightning-combobox
                                label="Document Type"
                                name="documentType"
                                value={documentType}
                                options={documentTypeOptions}
                                onchange={handleTypeChange}
                                required
                                placeholder="Select document type"
                                class="slds-m-top_small">
                            </lightning-combobox>

                            <!-- File Upload -->
                            <div class="slds-form-element slds-m-top_small">
                                <label class="slds-form-element__label" for="file-upload">
                                    <abbr class="slds-required" title="required">* </abbr>
                                    Upload File
                                </label>
                                <div class="slds-form-element__control">
                                    <input
                                        type="file"
                                        id="file-upload"
                                        class="slds-file-selector__input slds-assistive-text"
                                        accept="*/*"
                                        onchange={handleFileChange} />
                                    <label class="slds-file-selector__body" for="file-upload">
                                        <span class="slds-file-selector__button slds-button slds-button_neutral">
                                            <lightning-icon
                                                icon-name="utility:upload"
                                                size="x-small"
                                                class="slds-button__icon slds-button__icon_left">
                                            </lightning-icon>
                                            Choose File
                                        </span>
                                        <span class="slds-file-selector__text slds-medium-show">
                                            <template if:true={selectedFile}>
                                                {selectedFile.name}
                                            </template>
                                            <template if:false={selectedFile}>
                                                or drop file here
                                            </template>
                                        </span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Modal Footer -->
                    <footer class="slds-modal__footer">
                        <lightning-button
                            label="Cancel"
                            onclick={handleCloseModal}>
                        </lightning-button>
                        <lightning-button
                            label={saveButtonLabel}
                            variant="brand"
                            onclick={handleSave}>
                        </lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
