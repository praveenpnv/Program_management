<template>
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
    </template>

    
    <template if:false={isLoading}>
        <section class="slds-modal slds-fade-in-open" role="dialog">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-modal__title slds-hyphenate">Select Record Type</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template if:true={recordTypeOptions.length}>
                        <fieldset class="slds-form-element">
                            <legend class="slds-form-element__legend slds-form-element__label">
                                Available Record Types
                            </legend>
                            <div class="slds-form-element__control">
                                <template for:each={recordTypeOptions} for:item="option">
                                    <div key={option.value} class="slds-radio">
                                        <input
                                            type="radio"
                                            id={option.value}
                                            name="recordTypeRadio"
                                            value={option.value}
                                            onchange={handleChange}
                                            checked={option.checked}
                                        />
                                        <label class="slds-radio__label" for={option.value}>
                                            <span class="slds-radio_faux"></span>
                                            <span class="slds-form-element__label">{option.label}</span>
                                        </label>
                                    </div>
                                </template>
                            </div>
                        </fieldset>
                    </template>
                    <template if:true={error}>
                        <p class="slds-text-color_error">{error}</p>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleClose}></lightning-button>
                    <lightning-button variant="brand" label="Select" onclick={handleSubmit} disabled={isSubmitDisabled}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
