<template>
<template if:true={dataAvailable}>
    <lightning-progress-indicator current-step= {currentSubStage} type="path" variant="shade">
        <template for:each={stages} for:item="step">
            <lightning-progress-step label={step.label} value={step.value} key={step.label} onstepfocus={handleStageClick} class={isDisabled} ></lightning-progress-step>
        </template>
    </lightning-progress-indicator>
</template> 
</template>
