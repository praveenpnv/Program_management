<template>
    <lightning-card title="Torc User Details">
        <template if:true={torcUserId}>
            <div style="justify-content:left">
                <lightning-button label="Open in Torc" variant="brand" class="large-button" onclick={handleEdit}></lightning-button>
            </div>
            <lightning-record-form
                record-id={torcUserId}
                object-api-name="Torc_User__c"
                layout-type="Full"
                columns="2"
                mode="view">
            </lightning-record-form>
        </template>

        <template if:false={torcUserId}>
            <div class="slds-p-horizontal_medium">
                <p>Waiting for Torc User to be created in platform...</p>
                <lightning-spinner
                    alternative-text="Loading"
                    size="medium"
                    variant="brand">
                </lightning-spinner>
            </div>
        </template>

        
    
        <!-- Modal -->
    <template if:true={isModalOpen}>
        <section role="dialog" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container custom-size">
                <header class="slds-modal__header">
                    <button class="slds-button slds-modal__close" onclick={closeModal}>×</button>
                    <h2 class="slds-text-heading_medium">Edit Contact (External App)</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium custom-size">
                    <!-- Embed Canvas App -->
                    <iframe lwc:dom="manual" class="myframe" width="100%" height="100%" frameborder="0"></iframe>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>



    </lightning-card>
</template>
