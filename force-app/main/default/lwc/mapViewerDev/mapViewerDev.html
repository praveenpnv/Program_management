<template>
    <div class="territory-map-container">
        <!-- LEFT PANEL: Intelligence Dashboard -->
        <div class="left-panel">
            <div class="panel-header">
                <h3>🗺️ Regional Intelligence</h3>
                <p class="slds-text-body_small">Recruiting Operations Dashboard</p>
                
                <!-- View Mode Selector -->
                <div class="slds-button-group slds-m-top_small" role="group">
                    <lightning-button 
                        label="Daily" 
                        variant="brand"
                        icon-name="utility:dayview">
                    </lightning-button>
                    <lightning-button 
                        label="Workload" 
                        variant="neutral"
                        icon-name="utility:resource_capacity">
                    </lightning-button>
                    <lightning-button 
                        label="Performance" 
                        variant="neutral"
                        icon-name="utility:trending">
                    </lightning-button>
                </div>
            </div>

            <!-- Daily View Content -->
            <div class="filter-container">
                <!-- Urgent Section -->
                <div class="filter-section urgent-section">
                    <div class="filter-section-title">
                        <lightning-icon icon-name="utility:warning" size="x-small"></lightning-icon>
                        <span>🔥 URGENT - Work Now</span>
                    </div>
                    
                    <div class="priority-card critical">
                        <div class="card-header">
                            <span class="card-title">Past SLA</span>
                            <span class="filter-count">{pastSLACount}</span>
                        </div>
                        <div class="slds-text-body_small slds-text-color_weak">
                            Jobs that missed their deadline
                        </div>
                    </div>
                </div>

                <!-- Territory Summaries -->
                <div class="filter-section">
                    <div class="filter-section-title">
                        <span>📍 My Territories</span>
                        <span class="filter-count">{territorySummaries.length}</span>
                    </div>
                    
                    <template for:each={territorySummaries} for:item="territory">
                        <div key={territory.id} 
                             class="territory-card" 
                             onclick={handleTerritoryCardClick} 
                             data-id={territory.id}>
                            <div class="territory-header">
                                <span class="color-indicator" style={territory.colorStyle}></span>
                                <span class="card-title">{territory.name}</span>
                                <template if:true={territory.isHotspot}>
                                    <span class="slds-badge slds-theme_error">🔥</span>
                                </template>
                            </div>
                            <div class="slds-grid slds-wrap slds-grid_pull-padded slds-m-top_x-small">
                                <div class="slds-col slds-size_1-of-3 slds-text-align_center">
                                    <div class="stat-value">{territory.openJobs}</div>
                                    <div class="stat-label">Open</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-text-align_center">
                                    <div class="stat-value stat-error">{territory.urgentJobs}</div>
                                    <div class="stat-label">Urgent</div>
                                </div>
                                <div class="slds-col slds-size_1-of-3 slds-text-align_center">
                                    <div class="stat-value">{territory.fillRate}%</div>
                                    <div class="stat-label">Fill</div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- MAP DISPLAY -->
        <div class="map-wrapper">
            <div class="map-container" lwc:dom="manual"></div>
            
            <!-- Map Legend -->
            <div class="map-legend">
                <h4 class="slds-text-heading_small slds-m-bottom_x-small">Job Priority</h4>
                <div class="legend-item">
                    <span class="legend-marker critical"></span>
                    <span>Past SLA (Critical)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-marker high"></span>
                    <span>Due This Week</span>
                </div>
                <div class="legend-item">
                    <span class="legend-marker normal"></span>
                    <span>Active (On Track)</span>
                </div>
                <div class="legend-item">
                    <span class="legend-marker hotspot"></span>
                    <span>🔥 Hotspot Region</span>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: Contextual Actions -->
        <div class={sidePanelClass}>
            <template if:true={selectedRegion}>
                <div class="panel-header">
                    <div class="header-content">
                        <h2 class="slds-text-heading_medium">{selectedRegion.name}</h2>
                        <p class="slds-text-body_small region-details">
                            {selectedRegion.stateCode} • {selectedRegion.openJobs} Open Jobs
                        </p>
                    </div>
                    <lightning-button-icon
                        icon-name="utility:close"
                        variant="bare-inverse"
                        alternative-text="Close"
                        onclick={handleCloseSidePanel}>
                    </lightning-button-icon>
                </div>

                <!-- Territory Health Score -->
                <div class="panel-section health-section">
                    <h3 class="slds-text-heading_small slds-m-bottom_small">Territory Health</h3>
                    <div class="health-score-container">
                        <div class="health-score-circle" data-score={territoryHealthScore}>
                            <div class="score-number">{territoryHealthScore}</div>
                            <div class="score-label">/100</div>
                        </div>
                        <div class="health-indicators">
                            <div class="indicator-item">
                                <lightning-icon icon-name="utility:success" size="x-small"></lightning-icon>
                                <span>Fill: {selectedRegion.fillRate}%</span>
                            </div>
                            <div class="indicator-item">
                                <lightning-icon icon-name="utility:clock" size="x-small"></lightning-icon>
                                <span>{workloadStatus}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- KPIs -->
                <div class="panel-section">
                    <h3 class="slds-text-heading_small slds-m-bottom_small">Key Metrics</h3>
                    <div class="kpi-grid">
                        <div class="kpi-card">
                            <div class="kpi-value">{kpis.total}</div>
                            <div class="kpi-label">Open Jobs</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value kpi-error">{kpis.overdue}</div>
                            <div class="kpi-label">Past SLA</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value kpi-warning">{kpis.inProgress}</div>
                            <div class="kpi-label">In Pipeline</div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-value kpi-success">{kpis.filled}</div>
                            <div class="kpi-label">Filled MTD</div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="panel-section">
                    <h3 class="slds-text-heading_small slds-m-bottom_small">Quick Actions</h3>
                    <div class="action-buttons">
                        <lightning-button
                            label="Reassign Overdue Jobs"
                            variant="destructive"
                            class="full-width slds-m-bottom_x-small"
                            disabled={hasNoOverdueJobs}
                            icon-name="utility:rotate">
                        </lightning-button>
                        <lightning-button
                            label="Balance Workload"
                            variant="brand"
                            class="full-width slds-m-bottom_x-small"
                            icon-name="utility:resource_capacity">
                        </lightning-button>
                        <lightning-button
                            label="View Full Report"
                            variant="neutral"
                            class="full-width"
                            icon-name="utility:chart">
                        </lightning-button>
                    </div>
                </div>

                <!-- Jobs List -->
                <div class="panel-section">
                    <div class="section-header">
                        <h3 class="slds-text-heading_small">Jobs ({jobs.length})</h3>
                    </div>

                    <div class="record-list">
                        <template if:true={jobs.length}>
                            <template for:each={jobs} for:item="job">
                                <div key={job.id} class="record-card" data-urgency={job.urgencyLevel}>
                                    <div class="record-content">
                                        <div class="record-header">
                                            <span class="record-name">{job.name}</span>
                                            <lightning-badge label={job.status}></lightning-badge>
                                        </div>
                                        <div class="record-details">
                                            <span class="detail-item">
                                                Priority: {job.priority}
                                            </span>
                                            <span class="detail-item">
                                                Owner: {job.ownerName}
                                            </span>
                                            <template if:true={job.isOverdue}>
                                                <span class="detail-item overdue-badge">
                                                    ⚠️ OVERDUE
                                                </span>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </template>
                        <template if:false={jobs.length}>
                            <div class="empty-state">
                                <lightning-icon icon-name="utility:info" size="small"></lightning-icon>
                                <p class="slds-m-top_small">No jobs in this territory</p>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <template if:false={selectedRegion}>
                <div class="empty-panel">
                    <lightning-icon icon-name="utility:world" size="large"></lightning-icon>
                    <p class="slds-m-top_medium">Click on a territory to view details</p>
                </div>
            </template>
        </div>
    </div>
</template>
