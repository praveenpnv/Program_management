<template>
    <lightning-card title="D&B Account Search" icon-name="standard:search">
        <!-- Search Input Section -->
        <div class="slds-m-around_medium">
            <lightning-input 
                label="Search Term" 
                value={searchTerm} 
                onchange={handleSearchChange} 
                placeholder="Enter Account name to search">
            </lightning-input>
            
            <div class="slds-m-top_small">
                <lightning-button 
                    variant="brand" 
                    label="Search" 
                    onclick={handleSearch}>
                </lightning-button>
            </div>
        </div>

        <!-- Error Message -->
        <template if:true={error}>
            <div class="slds-m-around_medium">
                <lightning-formatted-text 
                    value={error} 
                    class="slds-text-color_error">
                </lightning-formatted-text>
            </div>
        </template>

        <!-- Search Results Table -->
        <template if:true={companies}>
            <template if:true={companies.length}>
                <div class="slds-m-around_medium">
                    <lightning-datatable
                        key-field="id"
                        data={companies}
                        columns={columns}
                        selected-rows={selectedRows}
                        onrowselection={handleRowSelection}
                        max-row-selection="1">
                    </lightning-datatable>
                    
                    <!-- Create Account Button - Float Right -->
                    <div class={createButtonClass}>
                        <lightning-button 
                            variant="brand" 
                            label="Create Account" 
                            onclick={handleCreateAccount}
                            disabled={isCreateButtonDisabled}>
                        </lightning-button>
                    </div>
                </div>
            </template>
        </template>

        <!-- Spinner -->
        <template if:true={showSpinner}>
            <div class="slds-m-around_medium">
                <lightning-spinner alternative-text="Loading..."></lightning-spinner>
            </div>
        </template>

        <!-- DUNS Error Modal -->
        <template if:true={showDunsErrorModal}>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" 
                     class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" 
                                title="Close" onclick={closeDunsErrorModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 id="modal-heading-01" class="slds-modal__title slds-hyphenate">Account Already Exists</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>{dunsError}</p>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button variant="neutral" label="Cancel" onclick={closeDunsErrorModal}></lightning-button>
                        <lightning-button variant="brand" label="View Existing Account" onclick={viewExistingAccount}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Standard Record Type Selection Modal -->
        <template if:true={showRecordTypeModal}>
            <section role="dialog" tabindex="-1" aria-labelledby="record-type-modal-heading" aria-modal="true" 
                     class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container slds-modal__container_medium">
                    <header class="slds-modal__header slds-modal__header_empty">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" 
                                title="Close" onclick={closeRecordTypeModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 id="record-type-modal-heading" class="slds-text-heading_medium slds-hyphenate">New Account</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="slds-text-body_regular slds-m-bottom_medium slds-text-color_weak">
                            Select account type
                        </div>
                        
                        <template if:true={availableRecordTypes}>
                            <template if:true={availableRecordTypes.length}>
                                <fieldset class="slds-form-element">
                                    <div class="slds-form-element__control">
                                        <template for:each={availableRecordTypes} for:item="recordType">
                                            <div key={recordType.Id} class="slds-radio">
                                                <input type="radio" 
                                                       id={recordType.Id} 
                                                       value={recordType.Id} 
                                                       name="recordTypeOptions"
                                                       onchange={handleRecordTypeSelection} />
                                                <label class="slds-radio__label" for={recordType.Id}>
                                                    <span class="slds-radio_faux"></span>
                                                    <span class="slds-form-element__label">{recordType.Name}</span>
                                                </label>
                                            </div>
                                        </template>
                                    </div>
                                </fieldset>
                            </template>
                        </template>
                        
                        <template if:false={availableRecordTypes.length}>
                            <p class="slds-text-color_weak">No record types available.</p>
                        </template>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button variant="neutral" label="Cancel" onclick={closeRecordTypeModal}></lightning-button>
                        <lightning-button variant="brand" label="Next" onclick={proceedWithSelectedRecordType}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Record Type Picker Modal (if using custom component) -->
        <template if:true={showRecordPicker}>
            <c-record-type-picker 
                object-api-name="Account"
                onclosemodal={handleCloseModal}>
            </c-record-type-picker>
        </template>
    </lightning-card>
</template>
